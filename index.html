<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Car Runner PRO MAX</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0f19; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">Score: 0</div>
    <canvas id="game"></canvas>

    <script>
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");
        c.width = window.innerWidth;
        c.height = window.innerHeight;

        let lane = 1; // 0=Left, 1=Center, 2=Right
        let score = 0;
        let speed = 8;
        let enemies = [];
        let gameActive = true;

        function getLaneX(l) {
            return (c.width / 3) * l + (c.width / 6) - 25;
        }

        function drawCar(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 50, 80);
        }

        // Touch Control - 3 Lanes Logic
        window.addEventListener("touchstart", e => {
            let touchX = e.touches[0].clientX;
            lane = Math.floor(touchX / (c.width / 3));
        });

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, c.width, c.height);

            // Road
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 0, c.width, c.height);

            // Enemies
            if (Math.random() < 0.05) {
                enemies.push({ x: getLaneX(Math.floor(Math.random()*3)), y: -100 });
            }

            enemies.forEach((e, i) => {
                e.y += speed;
                drawCar(e.x, e.y, "red");
                
                // Collision
                let playerX = getLaneX(lane);
                if (Math.abs(playerX - e.x) < 40 && Math.abs(c.height - 150 - e.y) < 70) {
                    gameActive = false;
                    alert("Game Over! Score: " + score);
                    location.reload();
                }
                if (e.y > c.height) { enemies.splice(i, 1); score++; }
            });

            // Player
            drawCar(getLaneX(lane), c.height - 150, "cyan");

            document.getElementById("ui").innerText = "Score: " + score;
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
